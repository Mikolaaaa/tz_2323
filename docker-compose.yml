services:
  db:
    image: postgres:16-alpine
    container_name: org-directory-db
    environment:
      POSTGRES_DB: org_directory
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d org_directory"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: org-directory-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/org_directory
      API_KEY: super-secret-api-key
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DB_POOL_SIZE: 10
      DB_MAX_OVERFLOW: 20
      DB_POOL_TIMEOUT: 30
      DB_POOL_RECYCLE: 1800
    ports:
      - "8000:8000"

volumes:
  postgres_data:
